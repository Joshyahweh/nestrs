name: Feature request
description: Propose a new feature or enhancement
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem and expected developer experience.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Preferred API/behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or other options.

  - type: textarea
    id: impact
    attributes:
      label: Impact and scope
      description: Breaking changes, migration impact, docs/test impact.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for existing feature requests before opening this issue.
          required: true
