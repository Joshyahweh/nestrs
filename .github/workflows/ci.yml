name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  MSRV: "1.88.0"

jobs:
  manifest-invariants:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workspace edition and MSRV policy
        run: python3 scripts/ci/check_msrv_edition.py

      - name: Reject Python cache artifacts in repo
        run: |
          python3 - <<'PY'
          import subprocess
          import sys

          out = subprocess.check_output(["git", "ls-files", "-z"])
          bad = []
          for rel in out.split(b"\0"):
              if not rel:
                  continue
              s = rel.decode(errors="replace")
              if "__pycache__/" in s or s.endswith(".pyc") or s.endswith(".pyo"):
                  bad.append(s)
          if bad:
              print("Python cache artifacts are tracked by git. Remove them:")
              for line in bad:
                  print(line)
              sys.exit(1)
          PY

  mintlify-nav:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Mintlify docs.json matches .mdx files
        run: python3 mintlify-docs/scripts/verify_mintlify_nav.py

  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.88.0", stable, beta]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Build
        run: cargo check --workspace --all-targets --all-features

      - name: Test
        run: |
          cargo test --workspace --all-features
          cargo test -p nestrs-prisma --features "sqlx,sqlx-sqlite" \
            --test prisma_model_client \
            --test query_optimization \
            --test transaction_batch \
            --test relation_queries \
            -- --test-threads=1

      - name: Extension crate integration smoke
        run: |
          cargo test -p nestrs --all-features \
            --test openapi_integration \
            --test graphql_sdl_export \
            --test ws_gateway_smoke \
            --test microservices_tcp_integration

  lint-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --all-features --no-deps

  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit
