name: publish-crates

# Publishes only after preflight passes. Use a tag on `main` (e.g. `v0.3.6`) or manual dispatch.
# After a successful tag-triggered publish, creates a GitHub Release (shows "Latest" on the repo).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-crates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag must be an ancestor of main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "Refuse publish: tag ${{ github.ref_name }} is not on origin/main."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rustfmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cargo audit
        run: cargo audit

  publish:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Require CARGO_REGISTRY_TOKEN
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "Set repository secret CARGO_REGISTRY_TOKEN (crates.io API token). Trusted Publishing (OIDC) is optional and not used in this workflow."
            exit 1
          fi

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          publish_pkg() {
            echo "Publishing $1 ..."
            cargo publish -p "$1" --locked
          }
          publish_pkg nestrs-macros
          sleep 30
          publish_pkg nestrs-core
          sleep 30
          publish_pkg nestrs-events
          sleep 30
          publish_pkg nestrs-ws
          sleep 30
          publish_pkg nestrs-graphql
          sleep 30
          publish_pkg nestrs-openapi
          sleep 30
          publish_pkg nestrs-cqrs
          sleep 30
          publish_pkg nestrs-microservices
          sleep 30
          publish_pkg nestrs
          sleep 30
          publish_pkg nestrs-prisma
          sleep 30
          publish_pkg nestrs-scaffold

  github-release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Crates for this tag were published to [crates.io](https://crates.io/crates/nestrs) from CI.
