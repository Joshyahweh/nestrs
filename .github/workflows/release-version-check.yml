name: release-version-check

on:
  pull_request:
    paths:
      - "VERSION"
      - "CHANGELOG.md"
      - "scripts/release/check_version_sync.py"
      - ".github/workflows/release-version-check.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "VERSION"
      - "CHANGELOG.md"
      - "scripts/release/check_version_sync.py"
      - ".github/workflows/release-version-check.yml"
  workflow_dispatch:

jobs:
  release-version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate VERSION and CHANGELOG sync
        run: python3 scripts/release/check_version_sync.py
