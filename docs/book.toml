[book]
title = "nestrs"
authors = ["nestrs contributors"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/Joshyahweh/nestrs"

# Rust Playground (play.rust-lang.org) does not include nestrs or most workspace crates.
# Without this, every ```rust block shows a Run button that always fails to compile.
[output.html.playground]
runnable = false
